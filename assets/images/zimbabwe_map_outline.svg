    <path d="M10 180 L20 140 L40 100 L60 70 L80 50 L100 30 L130 20 L160 10 L190 5 L220 8 L250 15 L270 25 L290 40 L310 60 L330 80 L350 100 L370 120 L385 140 L395 160 L398 180 L395 200 L385 220 L370 240 L350 260 L330 280 L310 295 L290 305 L270 315 L250 320 L220 325 L190 328 L160 325 L130 320 L100 310 L70 295 L50 280 L35 260 L20 240 L10 220 L5 200 Z"
      fill="#006B3F" stroke="#FFC72C" stroke-width="1.5"/>
    
