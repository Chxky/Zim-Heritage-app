    <!-- Province labels -->
    <text x="150" y="140" font-size="8" fill="#FFC72C" opacity="0.5">Mashonaland</text>
    <text x="210" y="220" font-size="7" fill="#FFC72C" opacity="0.5">Midlands</text>
    <text x="170" y="260" font-size="8" fill="#FFC72C" opacity="0.5">Masvingo</text>
    <text x="90" y="180" font-size="7" fill="#FFC72C" opacity="0.5">Mat North</text>
    <text x="80" y="270" font-size="7" fill="#FFC72C" opacity="0.5">Mat South</text>
    <text x="280" y="100" font-size="7" fill="#FFC72C" opacity="0.5">Manicaland</text>
  </g>
</svg>