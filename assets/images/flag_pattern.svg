<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 800" fill="none">
  <!-- Subtle Zimbabwe flag colour bars - diagonal faded stripes -->
  <g opacity="0.06">
    <rect x="-100" y="0" width="600" height="160" fill="#006B3F" transform="rotate(-15, 100, 0)"/>
    <rect x="-100" y="140" width="600" height="60" fill="#FFC72C" transform="rotate(-15, 100, 140)"/>
    <rect x="-100" y="200" width="600" height="40" fill="#000000" transform="rotate(-15, 100, 200)"/>
    <rect x="-100" y="240" width="600" height="40" fill="#CC0000" transform="rotate(-15, 100, 240)"/>
    <rect x="-100" y="280" width="600" height="60" fill="#FFC72C" transform="rotate(-15, 100, 280)"/>
    <rect x="-100" y="340" width="600" height="160" fill="#006B3F" transform="rotate(-15, 100, 340)"/>
    
    <!-- Repeat for lower half -->
    <rect x="-100" y="400" width="600" height="160" fill="#006B3F" transform="rotate(-15, 100, 400)"/>
    <rect x="-100" y="540" width="600" height="60" fill="#FFC72C" transform="rotate(-15, 100, 540)"/>
    <rect x="-100" y="600" width="600" height="40" fill="#000000" transform="rotate(-15, 100, 600)"/>
    <rect x="-100" y="640" width="600" height="40" fill="#CC0000" transform="rotate(-15, 100, 640)"/>
    <rect x="-100" y="680" width="600" height="60" fill="#FFC72C" transform="rotate(-15, 100, 680)"/>
    <rect x="-100" y="740" width="600" height="160" fill="#006B3F" transform="rotate(-15, 100, 740)"/>
  </g>
</svg>